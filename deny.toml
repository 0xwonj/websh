[graph]
all-features = true
targets = [
    "aarch64-apple-darwin",
    "x86_64-apple-darwin",
    "x86_64-unknown-linux-gnu",
    "wasm32-unknown-unknown",
]

[advisories]
yanked = "deny"
ignore = [
    { id = "RUSTSEC-2023-0071", reason = "Transitive through pgp 0.19. websh-cli uses pgp for local detached signature verification/import, not network-observable RSA private-key operations." },
    { id = "RUSTSEC-2024-0436", reason = "Transitive through maintained upstream crates. Keep visible until Leptos/alloy-primitives remove paste or expose a replacement path." },
]

[licenses]
allow = [
    "0BSD",
    "Apache-2.0",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "BSL-1.0",
    "bzip2-1.0.6",
    "CC0-1.0",
    "ISC",
    "MIT",
    "MPL-2.0",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "Unlicense",
    "Zlib",
]
confidence-threshold = 0.8
unused-allowed-license = "allow"

[[licenses.clarify]]
name = "ring"
expression = "MIT AND ISC AND OpenSSL"
license-files = [
    { path = "LICENSE", hash = 0xbd0eed23 },
]

[licenses.private]
ignore = true

[bans]
multiple-versions = "warn"
wildcards = "deny"
highlight = "simplest-path"

[bans.workspace-dependencies]
duplicates = "deny"
include-path-dependencies = false
unused = "warn"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
