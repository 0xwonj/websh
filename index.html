    <base href="./">
    <script>
        (() => {
            const key = "user.THEME";
            const themes = {
                // Dark (alphabetical)
                "catppuccin-mocha": "#1e1e2e",
                "dracula": "#282a36",
                "gruvbox-dark": "#282828",
                "kanagawa-wave": "#1f1f28",
                "nord": "#2e3440",
                "rose-pine": "#191724",
                "sepia-dark": "#100f0f",
                "tokyonight-night": "#1a1b26",
                // Light (alphabetical)
                "black-ink": "#fffcf0",
                "catppuccin-latte": "#eff1f5",
                "solarized-light": "#fdf6e3"
            };
            const aliases = {
                "sepia": "sepia-dark",
                "flexoki": "sepia-dark",
                "flexoki-dark": "sepia-dark",
                "dark-paper": "sepia-dark",
                "black": "black-ink",
                "ink": "black-ink",
                "paper": "black-ink",
                "paper-light": "black-ink",
                "flexoki-light": "black-ink",
                "gruvbox": "gruvbox-dark",
                "tokyonight": "tokyonight-night",
                "tokyo-night": "tokyonight-night",
                "night": "tokyonight-night",
                "solarized": "solarized-light",
                "light": "solarized-light",
                "vampire": "dracula",
                "catppuccin": "catppuccin-mocha",
                "mocha": "catppuccin-mocha",
                "latte": "catppuccin-latte",
                "nordic": "nord",
                "arctic": "nord",
                "rosepine": "rose-pine",
                "rose": "rose-pine",
                "pine": "rose-pine",
                "kanagawa": "kanagawa-wave",
                "wave": "kanagawa-wave"
            };
            const raw = localStorage.getItem(key) || "kanagawa-wave";
            const normalized = raw.trim().toLowerCase().replaceAll("_", "-");
            const theme = themes[normalized] ? normalized : aliases[normalized] || "kanagawa-wave";
            document.documentElement.setAttribute("data-theme", theme);
            document.querySelector('meta[name="theme-color"]')?.setAttribute("content", themes[theme]);
        })();
    </script>
