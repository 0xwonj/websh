[build]
target = "index.html"
dist = "dist"
public_url = "./"
filehash = true

[watch]
watch = ["crates/websh-web/src", "index.html", "assets/base.css", "assets/vendor", "content"]
ignore = ["assets/bundle.css"]
enable_cooldown = true

[serve]
addresses = ["127.0.0.1"]
port = 8080

[[hooks]]
stage = "pre_build"
command = "stylance"
command_arguments = ["--output-file", "assets/bundle.css", "crates/websh-web"]

[[hooks]]
stage = "pre_build"
command = "cargo"
command_arguments = ["run", "--quiet", "-p", "websh-cli", "--", "content", "manifest"]

[[hooks]]
stage = "pre_build"
command = "cargo"
command_arguments = ["run", "--quiet", "-p", "websh-cli", "--", "attest", "build"]
