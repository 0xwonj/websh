[build]
target = "index.html"
dist = "dist"
# Static hosting: use relative paths
public_url = "./"
# Add hash to filenames for cache optimization
filehash = true

[watch]
watch = ["src", "index.html", "assets/base.css", "assets/vendor", "content"]
ignore = ["assets/bundle.css"]
enable_cooldown = true

[serve]
addresses = ["127.0.0.1"]
port = 8080

# Build stylance CSS bundle before Trunk build
[[hooks]]
stage = "pre_build"
command = "stylance"
command_arguments = ["--output-file", "assets/bundle.css", "."]

# Regenerate content/manifest.json so the runtime's mount-declaration
# scan picks up any newly-added content/.websh/mounts/*.mount.json. The
# manifest is the source of truth for the runtime's view of the bundle
# source tree; without this, a freshly-added mount declaration on disk
# is invisible to the runtime until a manual `websh-cli content manifest`
# run.
[[hooks]]
stage = "pre_build"
command = "cargo"
command_arguments = ["run", "--quiet", "--bin", "websh-cli", "--", "content", "manifest"]
